name: petoteco
description: Petoteco Smart Pet Health Monitoring App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: 6.1.5+1

  # Local Storage
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3

  # Charts
  fl_chart: 0.69.0

  # HTTP
  http: 1.5.0

  # Icons
  cupertino_icons: ^1.0.8

  # Intl
  intl: 0.19.0

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  google_sign_in: 6.2.1
  image_picker: ^1.0.7
  firebase_storage: 12.3.2
  url_launcher: ^6.3.0

  # Local Push Notifications (系统通知栏推送)
  flutter_local_notifications: 17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
